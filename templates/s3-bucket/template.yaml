apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: s3-bucket
  title: Request S3 Bucket
  description: Self-service provisioning of a secure AWS S3 bucket via Terraform GitOps
  annotations:
    foundry.io/template-guide: |
      Opens a PR in `backstage-terraform`. Merge triggers HCP Terraform apply via GitHub Actions.

      See https://developer.hashicorp.com/terraform/tutorials/automation/github-actions
  tags:
    - aws
    - s3
    - storage
    - infrastructure
    - terraform
spec:
  owner: group:platform
  type: infrastructure

  parameters:
    - title: Bucket Information
      required:
        - bucket_name
        - aws_region
        - environment
        - owner
      properties:
        bucket_name:
          type: string
          title: Bucket Name
          description: Globally unique S3 bucket name (lowercase, hyphens allowed)
          pattern: "^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$"
          ui:autofocus: true
        aws_region:
          type: string
          title: AWS Region
          enum:
            - us-east-1
            - us-west-2
            - eu-west-1
          default: us-east-1
        environment:
          type: string
          title: Environment
          enum:
            - dev
            - staging
            - prod
          default: dev
        enable_versioning:
          type: boolean
          title: Enable Versioning
          default: true
        owner:
          title: Owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]

  steps:
    - id: fetch
      name: Render Bucket Configuration
      action: fetch:template
      input:
        url: ./skeleton
        values:
          bucket_name: ${{ parameters.bucket_name | trim }}
          aws_region: ${{ parameters.aws_region | trim }}
          environment: ${{ parameters.environment | trim }}
          enable_versioning: ${{ parameters.enable_versioning }}
          owner: ${{ parameters.owner }}

    - id: publish-pr
      name: Create Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: "github.com?owner=sajjadkhan-academy&repo=backstage-terraform"
        branchName: "infra/s3-${{ parameters.bucket_name | trim }}"
        title: "feat: add s3 bucket ${{ parameters.bucket_name | trim }}"
        description: |
          ## S3 Bucket Provisioning Request

          **Bucket Name:** ${{ parameters.bucket_name | trim }}
          **Region:** ${{ parameters.aws_region | trim }}

          Review the HCP Terraform plan comment on this PR, then merge to apply.
        targetPath: "."

  output:
    links:
      - title: View Pull Request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
        icon: github
