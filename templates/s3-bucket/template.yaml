apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: s3-bucket
  title: Request S3 Bucket
  description: Self-service provisioning of a secure AWS S3 bucket via Terraform GitOps
  annotations:
    foundry.io/template-guide: |
      Provisions an AWS S3 bucket by opening a pull request in the centralized Terraform repo.

      ## What you get

      - Secure S3 bucket (encryption, public access blocked, versioning)
      - Terraform configuration in `backstage-terraform`
      - HCP Terraform speculative plan on the PR
      - Backstage catalog Resource entity

      ## Prerequisites

      - HCP Terraform workspace configured for your team
      - AWS credentials configured in HCP Terraform org `sajjadkhan`
      - GitHub token with permission to open PRs on `backstage-terraform`

      ## After creation

      1. Review the PR — GitHub Actions runs fmt/validate; HCP Terraform runs plan
      2. Merge the PR to `main`
      3. HCP Terraform apply creates the bucket in AWS
  tags:
    - aws
    - s3
    - storage
    - infrastructure
    - terraform
spec:
  owner: group:platform
  type: infrastructure

  parameters:
    - title: Bucket Information
      required:
        - bucket_name
        - aws_region
        - team_id
        - environment
        - owner
      properties:
        bucket_name:
          type: string
          title: Bucket Name
          description: Globally unique S3 bucket name (lowercase, hyphens allowed)
          pattern: "^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$"
          ui:autofocus: true
          ui:help: "Example: team-alpha-app-data-dev"
        aws_region:
          type: string
          title: AWS Region
          description: Region where the bucket will be created
          enum:
            - us-east-1
            - us-east-2
            - us-west-1
            - us-west-2
            - eu-west-1
            - eu-west-2
            - eu-central-1
            - ap-southeast-1
            - ap-southeast-2
          default: us-east-1
          enumNames:
            us-east-1: "US East (N. Virginia)"
            us-east-2: "US East (Ohio)"
            us-west-1: "US West (N. California)"
            us-west-2: "US West (Oregon)"
            eu-west-1: "Europe (Ireland)"
            eu-west-2: "Europe (London)"
            eu-central-1: "Europe (Frankfurt)"
            ap-southeast-1: "Asia Pacific (Singapore)"
            ap-southeast-2: "Asia Pacific (Sydney)"
        team_id:
          type: string
          title: Team
          description: Team that owns this bucket (maps to a Terraform workspace)
          default: team-alpha
          enum:
            - team-alpha
        environment:
          type: string
          title: Environment
          description: Environment tag applied to the bucket
          enum:
            - dev
            - staging
            - prod
          default: dev
        enable_versioning:
          type: boolean
          title: Enable Versioning
          description: Enable S3 object versioning for data protection
          default: true
        owner:
          title: Owner
          type: string
          description: Backstage owner for this resource
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]

  steps:
    - id: fetch
      name: Render Bucket Configuration
      action: fetch:template
      input:
        url: ./skeleton
        values:
          bucket_name: ${{ parameters.bucket_name | trim }}
          aws_region: ${{ parameters.aws_region | trim }}
          team_id: ${{ parameters.team_id | trim }}
          environment: ${{ parameters.environment | trim }}
          enable_versioning: ${{ parameters.enable_versioning }}
          owner: ${{ parameters.owner }}

    - id: publish-pr
      name: Create Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: "github.com?owner=sajjadkhan-academy&repo=backstage-terraform"
        branchName: "infra/s3-${{ parameters.bucket_name | trim }}"
        title: "feat: add s3 bucket ${{ parameters.bucket_name | trim }}"
        description: |
          ## S3 Bucket Provisioning Request

          **Requested by:** Backstage Self-Service
          **Team:** ${{ parameters.team_id | trim }}
          **Bucket Name:** ${{ parameters.bucket_name | trim }}
          **Region:** ${{ parameters.aws_region | trim }}
          **Environment:** ${{ parameters.environment | trim }}
          **Versioning:** ${{ parameters.enable_versioning }}

          ### Review checklist

          - GitHub Actions fmt/validate passes
          - HCP Terraform speculative plan reviewed (workspace `backstage-terraform-${{ parameters.team_id | trim }}`)

          This PR was automatically generated by Backstage.
        targetPath: "teams/${{ parameters.team_id | trim }}"

  output:
    links:
      - title: View Pull Request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
        icon: github
      - title: Terraform Repository
        url: "https://github.com/sajjadkhan-academy/backstage-terraform"
        icon: github
