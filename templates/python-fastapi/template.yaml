apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: python-fastapi
  title: Python FastAPI Microservice
  description: Scaffolds a FastAPI service with GitHub Actions and centralized ArgoCD GitOps registration.
  tags:
    - python
    - fastapi
    - github-actions
    - kustomize
    - argocd
spec:
  owner: group:platform
  type: service

  parameters:
    - title: Service
      required:
        - service_name
        - github_org
        - image_registry
        - owner
        - environment
      properties:
        service_name:
          title: Service Name
          type: string
          description: DNS-safe service name.
          pattern: "^[a-z][a-z0-9-]{1,61}[a-z0-9]$"
          ui:autofocus: true
          ui:help: "Example: payment-api"
        service_port:
          title: Service Port
          type: number
          default: 8080
          description: The port the application container listens on.
        environment:
          title: Deployment Environment
          type: string
          description: The target environment for deploying this service.
          enum:
            - dev
            - staging
            - prod
          default: dev
        description:
          title: Description
          type: string
          default: "FastAPI microservice"
        github_org:
          title: GitHub Organization
          type: string
          description: Organization where the microservice repository will be created.
        image_registry:
          title: Image Registry
          type: string
          description: Registry namespace used for images, for example ghcr.io/my-org.
        git_branch:
          title: Default Branch
          type: string
          default: main
        owner:
          title: Owner
          type: string
          description: Backstage owner for this component.
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]

  steps:
    - id: fetch-service
      name: Render Microservice Repository
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: service
        values:
          service_name: ${{ parameters.service_name }}
          service_port: ${{ parameters.service_port }}
          environment: ${{ parameters.environment }}
          description: ${{ parameters.description }}
          github_org: ${{ parameters.github_org }}
          image_registry: ${{ parameters.image_registry }}
          image_repository: ${{ parameters.image_registry }}/${{ parameters.service_name }}
          git_branch: ${{ parameters.git_branch }}
          owner: ${{ parameters.owner }}
          repo_slug: ${{ parameters.github_org }}/${{ parameters.service_name }}

    - id: publish-service
      name: Create Microservice Repository
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ parameters.github_org }}&repo=${{ parameters.service_name }}
        sourcePath: service
        defaultBranch: ${{ parameters.git_branch }}
        repoVisibility: public
        description: ${{ parameters.description }}
        topics:
          - python
          - fastapi
          - microservice
          - backstage
          - gitops

    - id: register-catalog
      name: Register Component in Backstage
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-service'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

    - id: fetch-gitops-app
      name: Render Kustomize Manifests
      action: fetch:template
      input:
        url: ./gitops/apps/base
        targetPath: gitops/apps/${{ parameters.service_name }}
        values:
          service_name: ${{ parameters.service_name }}
          service_port: ${{ parameters.service_port }}
          image_repository: ${{ parameters.image_registry }}/${{ parameters.service_name }}

    - id: fetch-argocd-application
      name: Render ArgoCD Application
      action: fetch:template
      input:
        url: ./gitops/applications
        targetPath: gitops/applications
        values:
          service_name: ${{ parameters.service_name }}

    - id: register-gitops
      name: Register Application in Central ArgoCD Repo
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=sajjadkhan-academy&repo=argocd-centralized-repo-idp
        targetBranchName: main
        branchName: add-${{ parameters.service_name }}-dev
        sourcePath: gitops
        targetPath: .
        update: true
        title: "chore(gitops): add ${{ parameters.service_name }} dev application"
        description: |
          Adds the Kustomize base, dev overlay, and ArgoCD Application for `${{ parameters.service_name }}`.

          The service CI will update only `apps/${{ parameters.service_name }}/overlays/dev/kustomization.yaml`.

  output:
    links:
      - title: Microservice Repository
        url: ${{ steps['publish-service'].output.remoteUrl }}
        icon: github
      - title: Backstage Catalog Entity
        entityRef: ${{ steps['register-catalog'].output.entityRef }}
        icon: catalog
      - title: Central GitOps Registration Pull Request
        url: ${{ steps['register-gitops'].output.remoteUrl }}
        icon: github
