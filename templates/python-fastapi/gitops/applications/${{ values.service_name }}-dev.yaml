apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${{ values.service_name }}-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    app: ${{ values.service_name }}
    environment: dev
spec:
  project: default
  source:
    repoURL: https://github.com/sajjadkhan-academy/argocd-centralized-repo-idp.git
    targetRevision: main
    path: apps/${{ values.service_name }}/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
