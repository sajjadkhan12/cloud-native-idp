name: CI/CD

on:
  push:
    branches:
      - ${{ values.git_branch }}
  pull_request:
    branches:
      - ${{ values.git_branch }}

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ values.image_repository }}
  PYTHON_VERSION: "3.11"
  GITOPS_REPO: sajjadkhan-academy/argocd-centralized-repo-idp
  GITOPS_OVERLAY: apps/${{ values.service_name }}/overlays/dev/kustomization.yaml

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ "${{ env.PYTHON_VERSION }}" }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black ruff

      - name: Run Ruff Linter
        run: ruff check app

  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ "${{ github.event_name == 'push' }}" }}
    outputs:
      image_tag: ${{ "${{ github.sha }}" }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve registry host
        id: registry
        run: echo "host=${IMAGE_NAME%%/*}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ "${{ steps.registry.outputs.host }}" }}
          username: ${{ "${{ secrets.REGISTRY_USERNAME || github.actor }}" }}
          password: ${{ "${{ secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}" }}

      - name: Build and push immutable image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ "${{ env.IMAGE_NAME }}" }}:${{ "${{ github.sha }}" }}
          labels: |
            org.opencontainers.image.source=${{ "${{ github.server_url }}" }}/${{ "${{ github.repository }}" }}
            org.opencontainers.image.revision=${{ "${{ github.sha }}" }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    name: Update GitOps Manifest
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ "${{ github.event_name == 'push' }}" }}
    concurrency:
      group: gitops-${{ "${{ github.repository }}" }}
      cancel-in-progress: false
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ "${{ env.GITOPS_REPO }}" }}
          token: ${{ "${{ secrets.GITOPS_REPO_TOKEN }}" }}
          path: gitops

      - name: Set image tag to commit SHA
        uses: mikefarah/yq@v4
        with:
          cmd: >
            yq -i '.images[0].newTag = "${{ "${{ github.sha }}" }}"'
            gitops/${{ "${{ env.GITOPS_OVERLAY }}" }}

      - name: Commit and push
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ "${{ env.GITOPS_OVERLAY }}" }}"
          git diff --staged --quiet && exit 0
          git commit -m "chore(${{ values.service_name }}): deploy ${{ "${{ github.sha }}" }}"
          git push
